<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #111827;
    --border:  #1e2d45;
    --accent:  #0f3460;
    --blue:    #4cc9f0;
    --green:   #00d4aa;
    --red:     #e94560;
    --text:    #e2e8f0;
    --muted:   #64748b;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    padding: 1rem;
  }

  /* animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: .35;
    pointer-events: none;
  }

  /* glow blob */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #4cc9f012 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: relative;
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    animation: slideUp .35s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Logo ── */
  .logo {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #0f3460, #1a1a3e);
    border: 1px solid var(--blue);
    border-radius: 14px;
    margin-bottom: .75rem;
  }
  .logo-icon svg { width: 26px; height: 26px; color: var(--blue); }
  .logo h1 { font-size: 1.35rem; font-weight: 700; }
  .logo h1 span { color: var(--blue); }
  .logo p { font-size: .8rem; color: var(--muted); margin-top: .2rem; }

  /* ── Form ── */
  .form-group {
    margin-bottom: 1.1rem;
  }
  label {
    display: block;
    font-size: .78rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: .42rem;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap svg {
    position: absolute;
    left: .85rem;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted);
    pointer-events: none;
    transition: color .2s;
  }
  input {
    width: 100%;
    background: #080c14;
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: .92rem;
    padding: .7rem .85rem .7rem 2.5rem;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px #4cc9f018;
  }
  input:focus + svg,
  .input-wrap:focus-within svg:first-of-type { color: var(--blue); }
  input.error { border-color: var(--red); }
  input.error:focus { box-shadow: 0 0 0 3px #e9456018; }

  /* password toggle button */
  .eye-btn {
    position: absolute;
    right: .75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: .2rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    transition: color .2s;
  }
  .eye-btn:hover { color: var(--text); }
  .eye-btn svg {
    position: static;
    width: 16px; height: 16px;
    left: auto; top: auto;
    transform: none;
    pointer-events: none;
  }

  /* field error text */
  .field-err {
    display: none;
    font-size: .73rem;
    color: var(--red);
    margin-top: .3rem;
  }
  .field-err.show { display: block; }

  /* ── Submit ── */
  .btn-submit {
    width: 100%;
    padding: .78rem;
    margin-top: .4rem;
    background: linear-gradient(135deg, #4cc9f0, #00d4aa);
    border: none;
    border-radius: 9px;
    color: #000;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
  }
  .btn-submit:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
  .btn-submit:active:not(:disabled) { transform: none; }
  .btn-submit:disabled { opacity: .55; cursor: not-allowed; }

  /* secondary — browse lessons without logging in */
  .btn-secondary {
    width: 100%;
    padding: .7rem;
    background: transparent;
    border: 1px solid #4cc9f055;
    border-radius: 9px;
    color: var(--blue);
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background .2s, transform .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
  }
  .btn-secondary svg { width: 17px; height: 17px; }
  .btn-secondary:hover { background: #4cc9f014; transform: translateY(-1px); }
  .btn-secondary:active { transform: none; }

  /* spinner */
  .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid #00000040;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-submit.loading .spinner { display: block; }
  .btn-submit.loading .btn-text { opacity: 0; position: absolute; }

  /* ── Alert banner ── */
  .alert {
    display: none;
    align-items: flex-start;
    gap: .6rem;
    padding: .75rem 1rem;
    border-radius: 9px;
    font-size: .83rem;
    margin-bottom: 1.2rem;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .alert.show { display: flex; }
  .alert.error-alert { background: #1a0008; border: 1px solid var(--red); color: var(--red); }
  .alert svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

  /* ── Footer ── */
  .card-footer {
    margin-top: 1.5rem;
    text-align: center;
    font-size: .8rem;
    color: var(--muted);
  }
  .card-footer a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
  }
  .card-footer a:hover { text-decoration: underline; }

  .divider {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin: 1.4rem 0;
    color: var(--muted);
    font-size: .73rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card-copyright {
    margin-top: 1.2rem;
    text-align: center;
    font-size: .72rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>Welcome <span>Back</span></h1>
    <p>Sign in to your account</p>
  </div>

  <!-- Error alert -->
  <div class="alert error-alert" id="alertBox">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="alertMsg"></span>
  </div>

  <form id="loginForm" novalidate autocomplete="off">

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 8l10 7 10-7"/>
        </svg>
      </div>
      <div class="field-err" id="emailErr"></div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password">
          <!-- eye icon — toggled by JS -->
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="field-err" id="passwordErr"></div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">
      <span class="spinner"></span>
      <span class="btn-text">Sign In</span>
    </button>

  </form>

  <div class="divider">or</div>

  <a href="/ch1.html" class="btn-secondary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
    <span>เข้าสู่บทเรียนโดยไม่ต้องเข้าสู่ระบบ</span>
  </a>

  <div class="card-footer">
    Don't have an account? Contact the owner to get access.
  </div>

  <div class="card-copyright">
    &copy; 2026 Dr.Woranidtha Krungseanmuang
  </div>

</div>

<script>
  // ── token storage (memory only — survives page, not tab close) ────────────
  // For a real app swap this for a more robust strategy
  const setAccessToken = t => sessionStorage.setItem('access_token', t);

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const form       = document.getElementById('loginForm');
  const emailEl    = document.getElementById('email');
  const passEl     = document.getElementById('password');
  const submitBtn  = document.getElementById('submitBtn');
  const alertBox   = document.getElementById('alertBox');
  const alertMsg   = document.getElementById('alertMsg');
  const eyeBtn     = document.getElementById('eyeBtn');
  const eyeIcon    = document.getElementById('eyeIcon');
  const emailErr   = document.getElementById('emailErr');
  const passErr    = document.getElementById('passwordErr');

  // ── Password visibility toggle ──────────────────────────────────────────────
  const EYE_OPEN  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const EYE_CLOSE = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  eyeBtn.addEventListener('click', () => {
    const isPass = passEl.type === 'password';
    passEl.type = isPass ? 'text' : 'password';
    eyeIcon.innerHTML = isPass ? EYE_CLOSE : EYE_OPEN;
  });

  // ── Inline validation ────────────────────────────────────────────────────────
  const showFieldErr = (el, errEl, msg) => { el.classList.add('error'); errEl.textContent = msg; errEl.classList.add('show'); };
  const clearFieldErr = (el, errEl) => { el.classList.remove('error'); errEl.classList.remove('show'); };

  emailEl.addEventListener('input', () => clearFieldErr(emailEl, emailErr));
  passEl.addEventListener('input',  () => clearFieldErr(passEl,  passErr));

  function validate() {
    let ok = true;
    const emailVal = emailEl.value.trim();
    const passVal  = passEl.value;

    if (!emailVal) {
      showFieldErr(emailEl, emailErr, 'Email is required'); ok = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
      showFieldErr(emailEl, emailErr, 'Enter a valid email'); ok = false;
    }

    if (!passVal) {
      showFieldErr(passEl, passErr, 'Password is required'); ok = false;
    } else if (passVal.length < 8) {
      showFieldErr(passEl, passErr, 'At least 8 characters'); ok = false;
    }

    return ok;
  }

  // ── Alert helpers ────────────────────────────────────────────────────────────
  const showAlert = (msg) => { alertMsg.textContent = msg; alertBox.classList.add('show'); };
  const hideAlert = () => alertBox.classList.remove('show');

  // ── Loading state ────────────────────────────────────────────────────────────
  const setLoading = (on) => {
    submitBtn.disabled = on;
    submitBtn.classList.toggle('loading', on);
  };

  // ── Submit ───────────────────────────────────────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlert();

    if (!validate()) return;

    setLoading(true);

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',        // send/receive cookies
        body: JSON.stringify({
          email:    emailEl.value.trim().toLowerCase(),
          password: passEl.value,
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.message || 'Login failed');
        return;
      }

      setAccessToken(data.data.accessToken);
      window.location.href = '/ch1.html';

    } catch {
      showAlert('Network error — is the server running?');
    } finally {
      setLoading(false);
    }
  });

  // ── Redirect if already logged in ────────────────────────────────────────────
  if (sessionStorage.getItem('access_token')) {
    window.location.replace('/ch1.html');
  }
</script>
</body>
</html>

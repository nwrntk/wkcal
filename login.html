<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — Thomas Calculus Interactive</title>
<style>
  :root {
    --bg:      #0d1117;
    --card:    #111827;
    --border:  #1e2d45;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --blue:    #4cc9f0;
    --red:     #e94560;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    background-image: radial-gradient(circle at 50% 0%, #0f346033, transparent 60%);
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2.4rem 2rem;
    text-align: center;
    box-shadow: 0 20px 50px #0008;
  }
  .book {
    font-size: .62rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }
  .title {
    font-size: 1.35rem; font-weight: 700; margin-top: .35rem; line-height: 1.3;
  }
  .title .hl { color: var(--red); }
  .badge {
    display: inline-block;
    margin: 1.6rem 0 .9rem;
    padding: .35rem .9rem;
    font-size: .72rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--blue);
    background: #4cc9f013;
    border: 1px solid #4cc9f033;
    border-radius: 999px;
  }
  .detail {
    font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: .5rem;
  }
  .sub {
    font-size: .85rem; color: var(--muted); line-height: 1.6;
  }
  .dots::after {
    content: '';
    animation: dots 1.4s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }
  .back {
    display: inline-block;
    margin-top: 1.8rem;
    font-size: .8rem;
    color: var(--muted);
    text-decoration: none;
    transition: color .15s;
  }
  .back:hover { color: var(--blue); }
</style>
</head>
<body>
  <div class="card">
    <div class="book">Thomas Calculus</div>
    <div class="title">เข้าสู่<span class="hl">ระบบ</span></div>

    <span class="badge">Login</span>

    <div class="detail">Coming soon<span class="dots"></span></div>
    <p class="sub">ระบบเข้าสู่ระบบกำลังอยู่ระหว่างการพัฒนา<br>โปรดกลับมาใหม่อีกครั้ง</p>

    <a class="back" href="ch1.html">← กลับไปหน้าบทเรียน</a>
  </div>
</body>
</html>
